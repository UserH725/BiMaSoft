# ======================================================================================= #
# UNBOUND CONFIGURATION - VERSIONE FINALE "BUNKER" PER WINDOWS (v817.00) by Mauro Bigoni  #
#        HARDENED FOR WIREGUARD & CLOUDFLARE WARP [PROD-2026] TLS FORWARD + ROOT          #
# ======================================================================================= #

server:
    # === 1. COMPATIBILITÀ SISTEMA E PERCORSI ===
    chroot: ""                          # Disabilita l'isolamento chroot: necessario su Windows per i percorsi C:/
    verbosity: 0                        # Livello log minimo (nessun log scritto comunque: vedi logfile sotto)
    logfile: ""                         # Nessuna scrittura di log su disco (logging disattivato completamente)
    use-syslog: no                      # Disabilita anche il log di sistema di Windows: zero output di log, ovunque
    log-time-ascii: yes                 # Formato data/ora leggibile (AAAA-MM-GG HH:MM:SS) invece di timestamp Unix
    do-not-query-localhost: no          # Permette ad Unbound di comunicare con AdGuard Home sullo stesso PC
    tls-cert-bundle: "C:/Program Files/Unbound/ca-bundle.crt" # Certificati CA per validare connessioni DoT sicure
    module-config: "respip validator iterator" # Catena moduli: prima valida crittograficamente con DNSSEC, poi esegue la ricerca
    interface-automatic: no             # Disabilita il binding automatico: previene crash su Windows con interfacce dinamiche
    
    # === 1a. AUTO-CONFIGURAZIONE HARDWARE DINAMICA ===
    include: "C:/Program Files/Unbound/hardware.conf"

    # === 2. RETE E ACCESSO (INTEGRAZIONE ADGUARD, WARP & WIREGUARD) ===
    interface: 127.0.0.1                # Ascolta su IPv4 locale (per comunicare con AdGuard Home)
    interface: ::1                      # Ascolta su IPv6 locale (per comunicare con AdGuard Home)
    port: 5300                          # Porta di ascolto personalizzata: AdGuard userà questa per le query
    do-ip4: yes                         # Abilita la gestione del protocollo IPv4
    do-ip6: yes                         # Abilita la gestione del protocollo IPv6
    prefer-ip6: no                      # Preferisce IPv4 per le query esterne (evita le latenze tipiche dei tunnel IPv6 di WARP)

    access-control: 0.0.0.0/0 refuse    # Blocca tutto il traffico esterno IPv4 per impostazione predefinita
    access-control: ::0/0 refuse        # Blocca tutto il traffico esterno IPv6 per impostazione predefinita
    access-control: 127.0.0.1/32 allow  # Permette le query provenienti dal computer locale via IPv4
    access-control: ::1/128 allow       # Permette le query provenienti dal computer locale via IPv6

    # === 3. PRESTAZIONI E MULTI-THREADING (GESTIONE STRUTTURA) ===
    # outgoing-range e num-queries-per-thread: valori scalati per profilo RAM, impostati da hardware.conf
    so-reuseport: no                    # Windows non gestisce bene il reuseport multicast come Linux
    ip-freebind: no                     # Evita warning su alcune build di Unbound
    delay-close: 0                      # Chiude immediatamente i socket UDP vecchi, evitando di intasare l'interfaccia virtuale VPN

    # === 3.1 OTTIMIZZAZIONE DoT / TCP E PRIVACY TLS ===
    tcp-idle-timeout: 240000            # Mantiene i tunnel TLS aperti per 240s: elimina il ritardo di handshake
    tcp-reuse-timeout: 60000            # Tempo minimo prima che un socket TCP possa essere riutilizzato
    jostle-timeout: 100                 # Tempo in ms per scartare query vecchie in caso di sovraccarico
    # outgoing-num-tcp, incoming-num-tcp, stream-wait-size: valori scalati per profilo RAM, impostati da hardware.conf
    
    # === 3.2 HARDENING CRITTOGRAFICO TLS ---
    tls-service-key: ""                 # In localhost/client DoT non serve chiave privata per i forwarder
    tls-service-pem: ""                 # In localhost/client DoT non serve certificato locale per i forwarder
    tls-upstream: yes                   # Forzo l'uso del TLS per tutte le connessioni verso i forwarder DoT
    tls-session-ticket-keys: ""         # Abilita la TLS Session Resumption in memoria per abbattere la latenza dei tunnel
    tls-ciphers: "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305"
    tls-ciphersuites: "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256" # Forza l'uso esclusivo di cifrari ultra-sicuri TLS 1.3

    # === 4. OTTIMIZZAZIONE CACHE E MEMORIA VIA HARDWARE.CONF ===
    # key-cache-size e neg-cache-size: valori scalati per profilo RAM, impostati da hardware.conf
    cache-min-ttl: 60                   # Tempo minimo di permanenza in cache: garantisce freschezza (1 minuto)
    cache-max-ttl: 172800               # Tempo massimo di permanenza in cache: evita dati troppo obsoleti (48 ore)
    cache-max-negative-ttl: 300         # Tempo massimo per memorizzare risposte negative (5 minuti)

    # === 5. PREFETCH E STRATEGIA DI RESILIENZA SOTTO VPN ===
    prefetch: yes                       # Aggiorna i record popolari prima che scadano: navigazione sempre fluida
    prefetch-key: yes                   # Aggiorna le chiavi DNSSEC in anticipo per non rallentare le validazioni
    log-queries: no                     # Zero overhead di I/O su disco per ogni query.
    log-replies: no                     # Zero overhead di I/O su disco per ogni query.
    serve-expired: yes                  # Risponde con record scaduti se i server ufficiali o il tunnel VPN hanno un micro-timeout
    serve-expired-ttl: 172800           # Età massima di un record scaduto servibile dalla cache (2 gg)
    serve-expired-reply-ttl: 30         # TTL inviato al client per i dati scaduti per forzare un refresh rapido
    serve-expired-client-timeout: 1000  # Attesa in millisecondi prima di servire dati scaduti se la rete è lenta
    serve-original-ttl: no              # DISABILITATO

    # === 6. PRIVACY E MINIMIZZAZIONE DATI ===
    hide-identity: yes                  # Nasconde il nome identificativo del server DNS
    hide-version: yes                   # Nasconde la versione di Unbound per evitare fingerprinting
    hide-trustanchor: yes               # Nasconde i dettagli sulle chiavi DNSSEC di fiducia caricate
    qname-minimisation: yes             # Invia ai server solo la parte minima di dominio necessaria (Privacy)
    qname-minimisation-strict: no       # Fallback sicuro: se il server autoritativo remoto è mal configurato, non blocca la navigazione
    minimal-responses: yes              # Rende le risposte DNS il più brevi possibile (risparmio banda sul tunnel)
    send-client-subnet: no              # Disabilita l'invio del tuo indirizzo IP ai server esterni (No ECS)
    use-caps-for-id: yes                # Randomizzazione 0x20
    pad-responses: yes                  # Aggiunge byte extra alle risposte per nasconderne la dimensione reale
    pad-queries: yes                    # Aggiunge byte extra alle query in uscita per uniformare il traffico crittografato

    # === 7. HARDENING E SICUREZZA ===
    deny-any: yes                       # Blocca query di tipo ANY per prevenirne l'abuso in attacchi DDoS
    harden-algo-downgrade: yes          # Vieta l'uso di algoritmi DNSSEC deboli o non sicuri
    harden-below-nxdomain: yes          # Non interroga sottodomini se il dominio principale non esiste
    harden-referral-path: yes           # Protezione contro attacchi sul percorso di delega
    harden-glue: yes                    # Accetta gli IP dei nameserver solo se provengono dalla zona legittima
    harden-unverified-glue: yes         # Rifiuta i record di nameserver non verificabili tramite DNSSEC
    harden-dnssec-stripped: yes         # Rifiuta risposte se la protezione DNSSEC è stata rimossa forzatamente
    harden-large-queries: yes           # Blocca pacchetti DNS insolitamente grandi (vettori di attacco)
    harden-short-bufsize: yes           # Protegge da buffer EDNS troppo piccoli o manipolati
    aggressive-nsec: yes                # Usa dati NSEC in cache per generate risposte negative locali
    val-permissive-mode: no             # Massima sicurezza: se DNSSEC fallisce, il sito viene bloccato
    val-clean-additional: yes           # [PARANOICO] Rimuove tassativamente i dati non richiesti dalle risposte esterne prima di validare
    ede: yes                            # Abilita Extended DNS Errors per diagnosticare problemi DNSSEC in AdGuard
    edns-buffer-size: 1232              # Protezione aggiuntiva contro frammentazione UDP (Standard Corrente)
    max-udp-size: 1232                  # Forza lo stack a non frammentare mai i pacchetti sotto l'header della VPN
    ratelimit: 0                        # Previene abusi di query e attacchi di amplificazione - in localhost non serve

    # === 8. PROTEZIONE ANTI-REBINDING E ZONE LOCALI ===
    private-address: 10.0.0.0/8         # Impedisce risposte DNS che puntano a reti private Classe A
    private-address: 172.16.0.0/12      # Impedisce risposte DNS che puntano a reti private Classe B
    private-address: 192.168.0.0/16     # Impedisce risposte DNS che puntano a reti private Classe C
    private-address: 100.64.0.0/10      # OTTIMIZZATO VPN: Scherma l'intervallo CGNAT/WireGuard da attacchi di rebinding
    private-address: 127.0.0.0/8        # Impedisce il puntamento verso l'interfaccia locale IPv4
    private-address: ::ffff:0:0/96      # Blocca indirizzi IPv4 mascherati da IPv6
    private-address: 169.254.0.0/16     # link-local IPv4 (non routable)
    private-address: fd00::/8           # Unique Local Addresses IPv6 (privati)
    private-address: 224.0.0.0/4        # Range Multicast IPv4
    private-address: ff00::/8           # Range Multicast IPv6
    local-zone: "home.arpa." static     # Definisce il suffisso locale standard (evita query esterne per LAN)
    
    # === 8.1 ECCEZIONI DOMINI LOCALI (Esenta i nodi del tunnel dal blocco rebinding) ===
    private-domain: "tailscale.net"     # Permette la corretta risoluzione interna per nodi accoppiati
    # private-domain: "miostudio.local"  
    # private-domain: "home.lan"

    # === 8.2 RISOLUZIONE INVERSA LOCALE (Modalità trasparente anti-timeout sotto VPN) ===
    local-zone: "10.in-addr.arpa." transparent
    local-zone: "168.192.in-addr.arpa." transparent
    local-zone: "16.172.in-addr.arpa." transparent
    local-zone: "17.172.in-addr.arpa." transparent
    local-zone: "18.172.in-addr.arpa." transparent
    local-zone: "19.172.in-addr.arpa." transparent
    local-zone: "20.172.in-addr.arpa." transparent
    local-zone: "21.172.in-addr.arpa." transparent
    local-zone: "22.172.in-addr.arpa." transparent
    local-zone: "23.172.in-addr.arpa." transparent
    local-zone: "24.172.in-addr.arpa." transparent
    local-zone: "25.172.in-addr.arpa." transparent
    local-zone: "26.172.in-addr.arpa." transparent
    local-zone: "27.172.in-addr.arpa." transparent
    local-zone: "28.172.in-addr.arpa." transparent
    local-zone: "29.172.in-addr.arpa." transparent
    local-zone: "30.172.in-addr.arpa." transparent
    local-zone: "31.172.in-addr.arpa." transparent

    # === 9. DNSSEC E TUNING ALGORITMI ===
    auto-trust-anchor-file: "C:/Program Files/Unbound/root.key" # File per l'aggiornamento automatico della chiave radice
    root-hints: "C:/Program Files/Unbound/named.cache"          # File con gli indirizzi dei 13 Root Server mondiali
    val-bogus-ttl: 3600                 # Ricorda per 60 minuti se un sito ha fallito i controlli DNSSEC
    infra-host-ttl: 3600                # Tempo di conservazione delle performance degli host esterni
    infra-keep-probing: yes             # Continua a testare i server lenti o instabili a causa del tunnel
    low-rtt: 150                        # Soglia per considerare un server autoritativo come "veloce"
    fast-server-permil: 900             # Nel 90% dei casi sceglie il server più veloce: riduce la latenza
    fast-server-num: 2                  # Considera i 2 server migliori della lista per il calcolo della velocità
    target-fetch-policy: "3 2 1 0 0"    # Controlla quante query parallele Unbound lancia per risolvere i nameserver di ogni livello della gerarchia DNS

    # === 9.1 MICRO-TUNING AVANZATO (VELOCITÀ & AUDITING) ===
    rrset-roundrobin: yes               # Abilitato
    val-log-level: 0                    # Non logga nel dettaglio i motivi dei fallimenti crittografici DNSSEC

    # === 9.2 LIVELLO DI PRIVACY PARANOICO (ANTI-TELEMETRIA & SNAP) ===
    trust-anchor-signaling: no          # Disabilita l'RFC 8145: impedisce ad Unbound di inviare report automatici ai Root Server ICANN sulle chiavi che usi
    harden-unknown-additional: yes      # Rifiuta e rimuove dati sconosciuti nelle sezioni addizionali delle risposte per prevenire fingerprinting ed exploit

    # === 9.3 PROTEZIONE AVANZATA TIME-SKEW (ANTI-MANIPOLAZIONE) ===
    val-sig-skew-min: 10                # Zero tolleranza minima di validità delle firme
    val-sig-skew-max: 604800            # A 7 giorni per evitare falsi positivi

    # === 9.4 PRIVACY CRITTOGRAFICA ESTREMA (ANTI-PUMPING) ===
    unwanted-reply-threshold: 10000     # [PARANOICO] Se riceve 10k risposte fasulle, svuota la cache e pulisce i buffer
    # infra-cache-numhosts: valore scalato per profilo RAM, impostato da hardware.conf

rpz:
    name: "hagezi-pro-plus.rpz"
    zonefile: "C:/Program Files/Unbound/hagezi-pro-plus.conf"
    rpz-log: no                         # Nessun log dei domini bloccati (logging disattivato)
    rpz-log-name: "hagezi-pro-plus"     # Etichetta di zona (non piu' utilizzata da nessun parser esterno)

rpz:
    name: "hagezi-tif.rpz"
    zonefile: "C:/Program Files/Unbound/hagezi-tif.conf"
    rpz-log: no                         # Nessun log dei domini bloccati (logging disattivato)
    rpz-log-name: "hagezi-tif"          # Etichetta di zona (non piu' utilizzata da nessun parser esterno)

rpz:
    name: "spamhaus-drop-v4.rpz"
    zonefile: "C:/Program Files/Unbound/spamhaus-drop-v4.conf"
    rpz-log: no                         # Ottimizzato: Niente log dei netblock per preservare il disco (RPZ-IP, network-level C2/hijack)

rpz:
    name: "spamhaus-drop-v6.rpz"
    zonefile: "C:/Program Files/Unbound/spamhaus-drop-v6.conf"
    rpz-log: no                         # Ottimizzato: Niente log dei netblock IPv6 per preservare il disco (RPZ-IP, network-level C2/hijack)

rpz:
    name: "hagezi-tif-ips.rpz"
    zonefile: "C:/Program Files/Unbound/hagezi-tif-ips.conf"
    rpz-log: no                         # Ottimizzato: Niente log degli IP per preservare il disco (blocca connessioni dirette a IP malware/phishing/C2 che bypassano il DNS)

remote-control:
    control-enable: no
    control-interface: 127.0.0.1
    control-port: 8953
    control-use-cert: no

# =========================================================================
# === 11. FORWARD DNS                                                 =====
# =========================================================================
# NOTA: questi forward-addr formano un unico pool per la zona ".".
# Unbound NON li usa in ordine fisso: misura l'RTT di ciascuno e instrada
# la maggioranza delle query (fast-server-permil: 900) verso i 2 più
# veloci del momento (fast-server-num: 2). Se uno o più diventano
# irraggiungibili, Unbound li esclude automaticamente dal pool e
# redistribuisce il traffico sui restanti, senza bisogno di un fallback
# manuale tra i provider sottostanti.
# =========================================================================
forward-zone:
  name: "."
  forward-tls-upstream: yes

# ==============================================================================
# PROVIDER PRIVACY-ORIENTED & RETI ANYCAST (Veloci, Sicuri e Distribuiti)
# Infrastrutture globali ad alte prestazioni che non registrano dati (No-Logs).
# ==============================================================================

# --- 1. MULLVAD (No-Log, Svezia) --- 
# NOME RESOLVER: MULLVAD
forward-addr: 194.242.2.2@853#dns.mullvad.net
forward-addr: 2a07:e340::2@853#dns.mullvad.net

# --- 2. CONTROL D UNFILTERED (No-Log, IP SAN) ---
# NOME RESOLVER: CONTROL D
forward-addr: 76.76.2.11@853#p0.freedns.controld.com
forward-addr: 76.76.10.11@853#p0.freedns.controld.com
forward-addr: 2606:1a40::@853#p0.freedns.controld.com
forward-addr: 2606:1a40:1::@853#p0.freedns.controld.com

# --- 3. QUAD9 (Sicurezza No-Log, Svizzera) ---
# NOME RESOLVER: QUAD9
forward-addr: 9.9.9.10@853#dns10.quad9.net
forward-addr: 149.112.112.10@853#dns10.quad9.net
forward-addr: 2620:fe::10@853#dns10.quad9.net
forward-addr: 2620:fe::fe:10@853#dns10.quad9.net

# --- 4. DNS4EU Unfiltered (Sovranità UE, GDPR Strict) ---
