forward-addr: 45.90.28.173@853#38fd2d.dns.nextdns.io
forward-addr: 45.90.30.173@853#38fd2d.dns.nextdns.io
forward-addr: 2a07:a8c0::38:fd2d@853#38fd2d.dns.nextdns.io
forward-addr: 2a07:a8c1::38:fd2d@853#38fd2d.dns.nextdns.io

# --- 6. CLOUDFLARE DNS (Anycast ultra-veloce) ---
