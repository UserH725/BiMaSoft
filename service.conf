forward-addr: 2606:4700:4700::1111@853#cloudflare-dns.com
forward-addr: 2606:4700:4700::1001@853#cloudflare-dns.com

# =========================================================================
# === 12. CONFIGURAZIONE HYPERLOCAL (ULTIMA SPIAGGIA / FALLBACK PURO) ===
# =========================================================================
# Questa zona interviene SOLO se tutti i forwarder DoT sopra descritti
# falliscono (es. isolamento dei provider o problemi sulla porta 853).
# Rimbalzando qui, Unbound interrogherà i TLD partendo dal file locale.
#
# NOTA: zonemd-check + zonemd-reject-absence richiedono che
# root.zone sia SEMPRE aggiornato (le firme RRSIG scadono in 2-3 settimane).
# Il BAT ora rinnova root.zone ogni volta che ha più di 12h (sia al boot
# che nel refresh biorario) invece di scaricarlo una sola volta e lasciarlo
# invecchiare indefinitamente: è la causa che generava gli warning
# "ZONEMD verification failed" in rpz-live.log.
# =========================================================================
auth-zone:
    name: "."                               
    fallback-enabled: yes               # Permette ad Unbound di usare questa zona se i forwarder sopra falliscono
    for-upstream: yes                   # fallback "ultima spiaggia" basato sul file di root locale
    for-downstream: no                  # Non servire l'intera zona ai client locali
    zonemd-check: yes                   # Verifica l'integrità del file di zona (ZONEMD)
    zonemd-reject-absence: yes          # Rifiuta la zona se manca la protezione ZONEMD
    zonefile: "C:/Program Files/Unbound/root.zone" # Il tuo file aggiornato offline dallo Script Batch
